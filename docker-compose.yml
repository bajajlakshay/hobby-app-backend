services:
  postgres:
    image: postgres:17
    container_name: hobbyapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass123
      POSTGRES_DB: hobbyapp
    ports:
      - "5432:5432"
    volumes:
      - hobbyapp-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hobbyapp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  hobbyapp-pgdata:
