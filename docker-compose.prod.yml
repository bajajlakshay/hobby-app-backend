services:
  postgres:
    image: postgres:17
    container_name: hobbyapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - hobbyapp-pgdata:/var/lib/postgresql/data
    networks:
      - hobbyapp
    # Bind to the VPS loopback ONLY (127.0.0.1) so Postgres is reachable via an
    # SSH tunnel for admin tools (pgAdmin), but never exposed to the internet.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: hobbyapp-api
    container_name: hobbyapp-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      JwtSettings__Key: ${JWT_KEY}
      JwtSettings__Issuer: ${JWT_ISSUER}
      JwtSettings__Audience: ${JWT_AUDIENCE}
      EmailSettings__Host: ${EMAIL_HOST:-}
      EmailSettings__Port: ${EMAIL_PORT:-587}
      EmailSettings__Username: ${EMAIL_USERNAME:-}
      EmailSettings__Password: ${EMAIL_PASSWORD:-}
      EmailSettings__FromEmail: ${EMAIL_FROM:-}
      EmailSettings__FromName: ${EMAIL_FROM_NAME:-HobbyApp}
      EmailSettings__UseStartTls: ${EMAIL_USE_STARTTLS:-true}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hobbyapp
    # No published ports: only Caddy talks to the API, over the internal network.

  caddy:
    image: caddy:2
    container_name: hobbyapp-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
    networks:
      - hobbyapp

networks:
  hobbyapp:

volumes:
  hobbyapp-pgdata:
  caddy-data:
  caddy-config:
